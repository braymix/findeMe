disabled_rules:
  - trailing_whitespace
  - todo
opt_in_rules:
  - empty_count
  - closure_spacing
included:
  - Sources
  - App
  - Tests
excluded:
  - .build
line_length:
  warning: 140
  error: 200
identifier_name:
  min_length: 1  # allow short math/geometry names (x, y, t, d)
type_name:
  min_length: 2
