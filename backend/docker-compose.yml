services:
  postgres:
    image: postgres:16-alpine
    container_name: uwb-peer-compass-db
    environment:
      POSTGRES_USER: uwb
      POSTGRES_PASSWORD: uwb
      POSTGRES_DB: uwb_peer_compass
    ports:
      - "5432:5432"
    volumes:
      - uwb_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uwb -d uwb_peer_compass"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  uwb_pgdata:
