# Render Blueprint — https://render.com/docs/blueprint-spec
#
# Deploys the uwb-peer-compass rendezvous backend from a Dockerfile so the build is
# deterministic (this avoids the "exited with status 127" errors that happen when Render
# strips devDependencies under NODE_ENV=production and `tsc`/`prisma` can't be found).
# Auto-deploys on every push to `main`. PostgreSQL comes from DATABASE_URL.
#
# Public URL: https://findeme.onrender.com  (WebSocket: wss://findeme.onrender.com/ws)
#
# Setup: Render Dashboard ▸ New ▸ Blueprint ▸ point at this repo. Render builds the
# Docker image, runs `prisma migrate deploy`, then starts the server.

services:
  - type: web
    name: findeme
    runtime: docker
    plan: free
    branch: main
    autoDeploy: true
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      # Provided/managed by the Render environment (Postgres). Not synced from the repo.
      - key: DATABASE_URL
        sync: false
      # Secret for signing JWTs. Render generates a strong value on first deploy.
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      # Render injects PORT automatically; the server binds to it (config.ts).
      - key: ACCESS_TOKEN_TTL
        value: "900"
      - key: REFRESH_TOKEN_TTL
        value: "604800"
      - key: RATE_LIMIT_AUTH_PER_MIN
        value: "20"
